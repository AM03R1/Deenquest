<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b4335" />
    <meta
      name="description"
      content="Feedbackformulier voor DeenQuest."
    />
    <script>
      (() => {
        let theme = "light";
        try {
          theme = localStorage.getItem("deenquest-theme") === "dark" ? "dark" : "light";
        } catch {
          theme = "light";
        }

        document.documentElement.dataset.theme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "dark" ? "#07131f" : "#0b4335");
      })();
    </script>
    <title>Feedback - DeenQuest</title>
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css?v=71" />
  </head>
  <body>
    <div class="app-shell document-shell">
      <header class="app-header" aria-label="DeenQuest feedback">
        <div class="brand-lockup">
          <img class="brand-mark" src="assets/icon.svg" alt="" width="44" height="44" />
          <div>
            <h1>DeenQuest</h1>
            <p class="brand-greeting">Feedback</p>
          </div>
        </div>
        <a class="mini-link-button" href="index.html">Terug</a>
      </header>

      <main>
        <article class="document-card feedback-only-card">
          <p class="eyebrow">Feedback</p>
          <h2 id="feedbackTitle">Feedback geven</h2>
          <form
            class="feedback-form"
            id="feedbackForm"
            action="https://wa.me/"
            method="get"
            aria-labelledby="feedbackTitle"
          >
            <div class="feedback-field">
              <label for="feedbackMessage">Je feedback</label>
              <textarea
                id="feedbackMessage"
                name="body"
                maxlength="900"
                placeholder="Schrijf je feedback..."
                required
              ></textarea>
            </div>

            <div class="feedback-submit-row">
              <button class="primary-button" type="submit">Verstuur via WhatsApp</button>
              <p class="feedback-help" id="feedbackStatus" aria-live="polite"></p>
            </div>
          </form>
        </article>
      </main>
    </div>
    <script>
      const whatsappPhoneNumber = "31685612471";
      const feedbackForm = document.querySelector("#feedbackForm");
      const feedbackStatus = document.querySelector("#feedbackStatus");

      feedbackForm?.addEventListener("submit", (event) => {
        event.preventDefault();

        const data = new FormData(feedbackForm);
        const message = String(data.get("body") || "").trim();

        if (!message) {
          feedbackStatus.textContent = "Schrijf eerst kort je feedback op.";
          return;
        }

        const whatsappMessage = [
          "Hoi Omar, hierbij mijn feedback over DeenQuest.",
          "",
          message,
        ].join("\n");

        const whatsappPath = whatsappPhoneNumber ? `https://wa.me/${whatsappPhoneNumber}` : feedbackForm.action;
        const whatsappUrl = new URL(whatsappPath);
        whatsappUrl.searchParams.set("text", whatsappMessage);
        feedbackStatus.textContent = "WhatsApp wordt geopend met je feedback.";
        window.location.href = whatsappUrl.toString();
      });
    </script>
  </body>
</html>
